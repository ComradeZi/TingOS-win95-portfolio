<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirata Group Designs</title>
    <style>
        /* 1. Reset & Global Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #111111;
            line-height: 1.6;
            padding: 40px 20px;
        }

        /* 2. Layout Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        @media (min-width: 768px) {
            .container {
                flex-direction: row;
                align-items: flex-start;
                gap: 60px;
                padding-top: 40px;
            }
        }

        /* 3. Project Info / Header Panel */
        .project-info {
            flex: 1;
            max-width: 100%;
            position: relative;
        }

        @media (min-width: 768px) {
            .project-info {
                max-width: 300px;
                position: sticky;
                top: 40px;
            }
        }

        .project-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .project-subtitle {
            font-size: 16px;
            color: #666666;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .project-description {
            font-size: 14px;
            color: #333333;
            margin-bottom: 30px;
        }

        .project-meta {
            font-size: 13px;
            color: #888888;
            line-height: 1.8;
        }

        .project-meta p {
            margin-bottom: 4px;
        }

        /* 4. Responsive Image Gallery Grid */
        .gallery-grid {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 20px;
        }

        @media (min-width: 480px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 900px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 5. Gallery Item Styles */
        .gallery-item {
            overflow: hidden;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; /* Changes cursor to a magnifying glass/hand pointer */
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .gallery-item img:hover {
            opacity: 0.85;
        }

        /* 6. Lightbox / Enlarged Window Styles */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98); /* Clean white background overlay */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            cursor: zoom-out;
        }

        /* Class added via JavaScript when an image is clicked */
        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .lightbox-overlay.active .lightbox-content {
            transform: scale(1);
        }

        /* Close button (X) in top right corner */
        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 35px;
            font-weight: 200;
            color: #111;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header class="project-info">
            <h1 class="project-title">Pirata Group - F&B</h1>
            <h2 class="project-subtitle">- Lunch, Brunch and Menus and Events.</h2>
        </header>

        <main class="gallery-grid">
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/piratagroup/191227_TPP_Opening-flyer_OffWhite.webp" alt="Pirata 1"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/piratagroup/20190308_TL_BrunchParty_Tropical_March2019_Proof4.webp" alt="Pirata 2"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/piratagroup/TMK%20-%20April%20Brunch%20Flyer.webp" alt="Pirata 3"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/piratagroup/TMK%20-%20May%20Brunch%20Flyer.webp" alt="Pirata 4"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/piratagroup/Tokyolima%20-%20Easter%20Poster.webp" alt="Pirata 5"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/piratagroup/Tokyolima%20-%20Neon%20Fashion%20Party.webp" alt="Pirata 6"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/piratagroup/Chaiwala-11-1024x669%20(1).webp" alt="Pirata 7"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/piratagroup/TMK-Hero-Image%20(1).webp" alt="Pirata 8"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/piratagroup/honjo-festive_2-1.webp" alt="Pirata 9"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/piratagroup/HONJYOU-24JULY-56%20(1).webp" alt="Pirata 10"></div>
        </main>

    </div>

    <div class="lightbox-overlay" id="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="Enlarged view">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const galleryItems = document.querySelectorAll('.gallery-item img');

        // Open Lightbox on Image Click
        galleryItems.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src; // Copy image source
                lightboxImg.alt = img.alt; // Copy alt text
                lightbox.classList.add('active'); // Show modal
                document.body.style.overflow = 'hidden'; // Stop background scrolling
            });
        });

        // Close Lightbox on Clicking anywhere on the overlay
        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = ''; // Restore scrolling
            
            // Short delay to clear src so it doesn't "flash" old image next time it opens
            setTimeout(() => { lightboxImg.src = ''; }, 300); 
        });
    </script>

</body>
</html>
