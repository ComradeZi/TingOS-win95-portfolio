<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Under The Stars</title>
    <style>
        /* 1. Reset & Global Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #111111;
            line-height: 1.6;
            padding: 40px 20px;
        }

        /* 2. Layout Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        @media (min-width: 768px) {
            .container {
                flex-direction: row;
                align-items: flex-start;
                gap: 60px;
                padding-top: 40px;
            }
        }

        /* 3. Project Info / Header Panel */
        .project-info {
            flex: 1;
            max-width: 100%;
            position: relative;
        }

        @media (min-width: 768px) {
            .project-info {
                max-width: 300px;
                position: sticky;
                top: 40px;
            }
        }

        .project-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .project-subtitle {
            font-size: 16px;
            color: #666666;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .project-description {
            font-size: 14px;
            color: #333333;
            margin-bottom: 30px;
        }

        .project-meta {
            font-size: 13px;
            color: #888888;
            line-height: 1.8;
        }

        .project-meta p {
            margin-bottom: 4px;
        }

        /* 4. Responsive Image Gallery Grid */
        .gallery-grid {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 20px;
        }

        @media (min-width: 480px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 900px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 5. Gallery Item Styles */
        .gallery-item {
            overflow: hidden;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; /* Changes cursor to a magnifying glass/hand pointer */
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .gallery-item img:hover {
            opacity: 0.85;
        }

        /* 6. Lightbox / Enlarged Window Styles */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98); /* Clean white background overlay */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            cursor: zoom-out;
        }

        /* Class added via JavaScript when an image is clicked */
        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .lightbox-overlay.active .lightbox-content {
            transform: scale(1);
        }

        /* Close button (X) in top right corner */
        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 35px;
            font-weight: 200;
            color: #111;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header class="project-info">
            <h1 class="project-title">Night Under The Stars</h1>
            <h2 class="project-subtitle">— Goethe Institut</h2>
            
            <div class="project-description">
                <p>Series of posters for artists and musicians that were hosted by the Goethe Institut of Namibia.</p>
            </div>
            
            <div class="project-meta">
                <p><strong>Studio:</strong> Turipamwe Design Studio</p>
                <p><strong>Design:</strong> Barton Ting</p>
            </div>
        </header>

        <main class="gallery-grid">
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/nuts/NUTSDecember2017_RAS_Webbie_27thNovember2017.webp" alt="NUTS December 2017"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/nuts/NUTSMarch2017_Proof1_Webbie_17Feb2017.webp" alt="NUTS March 2017"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/nuts/NUTSWarehouseTheatreOctober_WolfgangSuzy_Webbie_04September2017.webp" alt="NUTS October"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/nuts/NUTSMay2017_The-Boligamist_Webbie_25April2017.webp" alt="NUTS May 2017"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/nuts/NUTSFebruary2017_Proof3_9thDecember2016-2.webp" alt="NUTS February 2017"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/nuts/NUTS_October2016_Proof1_14thSeptember2016.webp" alt="NUTS October 2016"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/nuts/NUTS_November2016_Proof2_26thOctober2016.webp" alt="NUTS Portrait"></div>
            <div class="gallery-item"><img src="https://pub-0143ea8245794385b9160a3146a8360e.r2.dev/projects/nuts/NUTS%20-%20portrait.webp" alt="NUTS November 2016"></div>
        </main>

    </div>

    <div class="lightbox-overlay" id="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="Enlarged view">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const galleryItems = document.querySelectorAll('.gallery-item img');

        // Open Lightbox on Image Click
        galleryItems.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src; // Copy image source
                lightboxImg.alt = img.alt; // Copy alt text
                lightbox.classList.add('active'); // Show modal
                document.body.style.overflow = 'hidden'; // Stop background scrolling
            });
        });

        // Close Lightbox on Clicking anywhere on the overlay
        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = ''; // Restore scrolling
            
            // Short delay to clear src so it doesn't "flash" old image next time it opens
            setTimeout(() => { lightboxImg.src = ''; }, 300); 
        });
    </script>

</body>
</html>
